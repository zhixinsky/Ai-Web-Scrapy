<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI数据采集系统</title>
  <style>
    :root {
      --teal-600: #0d9488;
      --teal-700: #0f766e;
      --emerald-600: #059669;
      --slate-800: #1e293b;
      --slate-500: #64748b;
      --slate-200: #e2e8f0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #f7faf9;
      color: var(--slate-800);
      font-size: 13px;
      min-height: 100vh;
    }
    .chrome-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .chrome-bg .dots {
      position: absolute;
      inset: 0;
      opacity: 0.55;
      background-image: radial-gradient(#d8ebe4 0.5px, transparent 0.5px);
      background-size: 20px 20px;
    }
    .chrome-bg .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(48px);
    }
    .chrome-bg .b1 {
      left: -128px;
      top: 80px;
      width: 288px;
      height: 288px;
      background: rgba(45, 212, 191, 0.25);
    }
    .chrome-bg .b2 {
      right: -96px;
      bottom: 128px;
      width: 320px;
      height: 320px;
      background: rgba(125, 211, 252, 0.3);
    }
    .chrome-bg .b3 {
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 384px;
      height: 384px;
      background: rgba(167, 243, 208, 0.2);
    }
    .shell {
      position: relative;
      z-index: 1;
      padding: 16px;
      max-width: 420px;
      margin: 0 auto;
    }
    .card {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.85);
      border-radius: 24px;
      padding: 20px 22px;
      margin-bottom: 14px;
      box-shadow:
        0 0 0 1px rgba(15, 23, 42, 0.04),
        0 20px 50px -12px rgba(15, 118, 110, 0.12),
        0 8px 24px -8px rgba(15, 23, 42, 0.08);
      backdrop-filter: blur(6px);
    }
    .brand-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .brand-logo {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      object-fit: contain;
    }
    .title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--slate-800);
      margin: 0;
      line-height: 1.35;
    }
    .subtitle {
      font-size: 12px;
      color: var(--slate-500);
      margin: 4px 0 0;
      line-height: 1.45;
    }
    .config-label {
      font-weight: 500;
      font-size: 12px;
      color: #475569;
      margin-bottom: 6px;
      display: block;
    }
    .path-input,
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(226, 232, 240, 0.95);
      border-radius: 12px;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.95);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .path-input:focus,
    textarea:focus,
    select:focus {
      border-color: rgba(45, 212, 191, 0.6);
      box-shadow: 0 0 0 3px rgba(45, 212, 191, 0.15);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
      font-family: ui-monospace, 'Cascadia Code', monospace;
      font-size: 12px;
    }
    .hint {
      font-size: 11px;
      color: #64748b;
      margin-top: 8px;
      line-height: 1.55;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      align-items: center;
    }
    .btn {
      padding: 10px 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: opacity 0.15s, transform 0.05s;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    .btn-primary {
      width: 100%;
      background: linear-gradient(to right, var(--teal-600), var(--emerald-600));
      color: #fff;
      box-shadow: 0 4px 14px -4px rgba(13, 148, 136, 0.45);
    }
    /* 批量采集卡片内按钮：不要占满整行 */
    .btn-primary-inline {
      width: auto;
    }
    .card.batch-collapsed {
      padding-top: 14px;
      padding-bottom: 14px;
    }
    /* 采集当前页 + 批量采集：同一行，右侧为批量入口 */
    .scrape-toolbar-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: nowrap;
      margin-top: 12px;
    }
    .scrape-toolbar-row .btn {
      flex-shrink: 0;
    }
    .scrape-toolbar-row .btn-success {
      min-width: 0;
      flex: 1 1 auto;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    #btnBatchPanelToggle {
      font-weight: 600;
      font-size: 12px;
      padding: 8px 12px;
    }
    #btnBatchPanelToggle[aria-expanded="true"] {
      background: #e0f2f1;
      border-color: rgba(45, 212, 191, 0.45);
      color: var(--teal-700);
    }
    .batch-card-body {
      margin-top: 0;
    }
    .batch-append-row {
      margin-bottom: 8px;
    }
    #btnBatchAppendCurrent {
      white-space: nowrap;
    }
    /* 批量：主操作略大于清空/保存，一行排列 */
    .batch-action-toolbar {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      margin-top: 10px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .batch-toolbar-spacer {
      flex: 1 1 auto;
      min-width: 8px;
    }
    .batch-btn-lg {
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .batch-action-toolbar .btn-sm {
      padding: 5px 10px;
      font-size: 11px;
      font-weight: 600;
    }
    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.05);
    }
    .btn-muted {
      background: #f1f5f9;
      color: #475569;
      border: 1px solid var(--slate-200);
    }
    .btn-muted:hover {
      background: #e2e8f0;
    }
    /* 图片存储：本地 | OSS 分段开关 */
    .storage-seg {
      display: flex;
      width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(226, 232, 240, 0.95);
      overflow: hidden;
      background: #f1f5f9;
    }
    .storage-seg button {
      flex: 1;
      padding: 10px 12px;
      border: none;
      background: transparent;
      font-size: 13px;
      font-weight: 600;
      color: #64748b;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .storage-seg button.active {
      background: #fff;
      color: var(--teal-700);
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
    }
    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .rule-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 6px;
      flex-wrap: wrap;
    }
    .rule-row .config-label {
      margin-bottom: 0;
    }
    .btn-success {
      background: linear-gradient(to right, var(--teal-600), var(--emerald-600));
      color: #fff;
      box-shadow: 0 4px 14px -4px rgba(13, 148, 136, 0.35);
    }
    .btn-success:hover {
      filter: brightness(1.05);
    }
    .btn-danger {
      background: linear-gradient(to right, #ef4444, #f97316);
      color: #fff;
      box-shadow: 0 4px 14px -4px rgba(239, 68, 68, 0.35);
    }
    .btn-danger:hover:not(:disabled) {
      filter: brightness(1.05);
    }
    .muted {
      color: #64748b;
      font-size: 12px;
      line-height: 1.5;
    }
    .path-input.api-base-input {
      background: #f1f5f9;
      border-color: #e2e8f0;
      color: #334155;
    }
    .path-input.api-base-input:focus {
      background: #f8fafc;
      border-color: rgba(45, 212, 191, 0.55);
    }
    .path-input.api-base-input::placeholder {
      color: #94a3b8;
    }
    #toast {
      position: fixed;
      bottom: 16px;
      right: 16px;
      left: 16px;
      margin: 0 auto;
      max-width: 360px;
      padding: 10px 14px;
      background: #1e293b;
      color: #fff;
      border-radius: 12px;
      font-size: 12px;
      display: none;
      z-index: 9999;
      text-align: center;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.38);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 9998;
    }
    .modal-card {
      width: 100%;
      max-width: 520px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(226, 232, 240, 0.95);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 18px 50px -20px rgba(15, 23, 42, 0.35);
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>
  <div class="chrome-bg" aria-hidden="true">
    <div class="dots"></div>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>

  <div class="shell">
    <div id="panelLogin" class="card" style="display: none">
      <div class="brand-row">
        <img class="brand-logo" src="logo.png" alt="" width="44" height="44" />
        <div>
          <h1 class="title">AI数据采集系统</h1>
          <p class="subtitle">使用已开通的账号登录</p>
        </div>
      </div>
      <div class="rule-row">
        <label class="config-label" for="apiBaseInput">后台 API 地址</label>
        <button type="button" class="btn btn-muted btn-sm" id="btnSaveApi">保存</button>
      </div>
      <input
        type="url"
        id="apiBaseInput"
        class="path-input api-base-input"
        autocomplete="off"
        spellcheck="false"
        placeholder="留空则使用默认接口"
      />
      <label class="config-label" for="loginUser" style="margin-top: 14px">用户名</label>
      <input type="text" id="loginUser" class="path-input" autocomplete="username" placeholder="请输入用户名" />
      <label class="config-label" for="loginPass" style="margin-top: 12px">密码</label>
      <input type="password" id="loginPass" class="path-input" autocomplete="current-password" placeholder="请输入密码" />
      <div class="toolbar">
        <button type="button" class="btn btn-primary" id="btnLogin">登录</button>
      </div>
      <p class="hint">本系统账号仅供授权使用；开通与密码问题请联系管理员。</p>
    </div>

    <div id="panelMain" class="card" style="display: none">
      <div class="muted" id="userLine"></div>
      <div style="margin-top: 12px">
        <div class="rule-row">
          <span class="config-label">采集规则</span>
          <div class="toolbar" style="margin-top: 0">
            <button type="button" class="btn btn-muted btn-sm" id="btnRefreshRules">刷新规则</button>
            <button type="button" class="btn btn-muted btn-sm" id="btnLogout">退出登录</button>
          </div>
        </div>
        <select id="ruleSelect">
          <option value="">加载中…</option>
        </select>

      </div>
      <div style="margin-top: 12px">
        <span class="config-label">图片存储（本批上报）</span>
        <div class="storage-seg" role="group" aria-label="图片存储">
          <button type="button" id="btnStorageLocal" class="active">本地服务器</button>
          <button type="button" id="btnStorageOss">阿里云OSS</button>
        </div>

      </div>
      <div class="scrape-toolbar-row">
        <button type="button" class="btn btn-success" id="btnScrapeCurrent">采集当前标签页</button>
        <button
          type="button"
          class="btn btn-muted"
          id="btnBatchPanelToggle"
          aria-expanded="false"
          aria-controls="batchCardBody"
          title="展开或收起批量采集"
        >
          批量采集
        </button>
      </div>
    </div>

    <div class="card batch-collapsed" id="batchCard" style="display: none">
      <div class="batch-card-body" id="batchCardBody" hidden>
        <div class="batch-append-row">
          <button type="button" class="btn btn-success btn-sm" id="btnBatchAppendCurrent" title="将当前浏览器标签页的地址追加到列表末尾并保存">
            添加当前页
          </button>
        </div>
        <textarea
          id="batchUrlsInput"
          class="path-input"
          style="height: 160px; resize: vertical; white-space: pre"
          spellcheck="false"
          placeholder=""
        ></textarea>
        <div class="batch-action-toolbar">
          <button type="button" class="btn btn-primary btn-primary-inline batch-btn-lg" id="btnBatchStart">
            开始批量采集
          </button>
          <button type="button" class="btn btn-danger batch-btn-lg" id="btnBatchStop" disabled>停止</button>
          <span class="batch-toolbar-spacer" aria-hidden="true"></span>
          <button type="button" class="btn btn-muted btn-sm" id="btnBatchClear">清空</button>
          <button type="button" class="btn btn-muted btn-sm" id="btnBatchSave">保存</button>
        </div>
        <div class="hint" id="batchStatusLine" style="margin-top: 10px; display: none"></div>
      </div>
    </div>

    <div class="card">
      <span class="config-label">采集日志</span>
      <textarea id="logArea" readonly placeholder="登录、选择规则、采集与上报结果将显示在此…"></textarea>
    </div>
  </div>
  <div id="toast"></div>
  <script src="config.js"></script>
  <script src="side_panel.js"></script>
</body>
</html>
